<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="adopt.css">
</head>
<body>
    <div class="adopt-container">
        <h1 id="adopt_title"></h1>
        <img src="" id="img">
        <h2 id="dog_name"></h2>
        <form id="adopt_form">
            <label for="email" id="mail_l">Email:</label>
            <input type="email" id="email" required>
            <label for="fullname" id="name_l">Full Name:</label>
            <input type="text" id="fullname" required>
            <label for="phone_number" id="phone_l">Phone Number:</label>
            <input type="tel" id="phone_number" required>
            <button type="submit" id="send_b">Send</button>
        </form>
    </div>
    <script src="script.js"></script>
    <script src="adopt.js"></script>
</body>
